# golangci-lint v2 configuration.
# Sane defaults — not over-linted. The default linters (errcheck, govet,
# staticcheck, ineffassign, unused) cover most needs; gofmt is enforced as a
# formatter.
version: "2"

run:
  # Lint tagged files too (sandbox/repro integration tests, llm live probes,
  # eval corpus recorder); without these, helpers used only from tagged files
  # are misreported as unused.
  build-tags:
    - integration
    - live
    - record

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused

formatters:
  enable:
    - gofmt
