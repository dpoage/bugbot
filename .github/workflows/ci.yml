name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: build / vet / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          check-latest: true
          cache: true

      - name: build
        run: go build ./...

      - name: vet
        run: go vet ./...

      - name: test
        run: go test -race ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          check-latest: true
          # golangci-lint-action manages its own cache; avoid double-caching.
          cache: false

      - name: golangci-lint
        # v6 of the action installs golangci-lint v1 (built with go1.24), which
        # cannot load our v2-schema .golangci.yml or target go 1.25. v8 resolves
        # golangci-lint v2 binaries.
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
